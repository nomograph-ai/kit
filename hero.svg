<svg viewBox="0 0 1200 430" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with border -->
  <rect x="0" y="0" width="1200" height="430" fill="#faf6ed"
        stroke="#2c2417" stroke-width="3"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="1200" height="36" fill="#2c2417"/>
  <text x="16" y="24" font-family="'IBM Plex Mono', monospace"
        font-size="14" fill="#faf6ed" font-weight="bold">kit</text>
  <text x="1184" y="24" font-family="'IBM Plex Mono', monospace"
        font-size="11" fill="#c4b99a" text-anchor="end">verified tool registry manager</text>

  <!-- === LEFT: INPUTS (upstream sources + registries) === -->
  <text x="60" y="65" font-family="'IBM Plex Mono', monospace"
        font-size="10" fill="#6b5d4f">upstream sources</text>

  <rect x="60" y="78" width="180" height="40" fill="none"
        stroke="#2c2417" stroke-width="1.5"/>
  <text x="150" y="102" text-anchor="middle" font-family="'IBM Plex Mono', monospace"
        font-size="9" fill="#2c2417">GitHub releases</text>
  <rect x="60" y="125" width="180" height="40" fill="none"
        stroke="#2c2417" stroke-width="1.5"/>
  <text x="150" y="149" text-anchor="middle" font-family="'IBM Plex Mono', monospace"
        font-size="9" fill="#2c2417">GitLab packages</text>
  <rect x="60" y="172" width="180" height="40" fill="none"
        stroke="#c4b99a" stroke-width="1.5"/>
  <text x="150" y="196" text-anchor="middle" font-family="'IBM Plex Mono', monospace"
        font-size="9" fill="#6b5d4f">npm / crates / direct</text>

  <!-- Registries -->
  <text x="60" y="240" font-family="'IBM Plex Mono', monospace"
        font-size="10" fill="#6b5d4f">git-based registries</text>

  <rect x="60" y="252" width="240" height="90" fill="none"
        stroke="#2c2417" stroke-width="2"/>
  <rect x="60" y="252" width="240" height="22" fill="#2c2417"/>
  <text x="180" y="268" text-anchor="middle" font-family="'IBM Plex Mono', monospace"
        font-size="10" fill="#faf6ed" font-weight="bold">kits/ (registry repo)</text>
  <text x="75" y="290" font-family="'IBM Plex Mono', monospace"
        font-size="9" fill="#2c2417">tools/gh.toml</text>
  <text x="75" y="305" font-family="'IBM Plex Mono', monospace"
        font-size="9" fill="#6b5d4f">tools/jq.toml</text>
  <text x="75" y="320" font-family="'IBM Plex Mono', monospace"
        font-size="9" fill="#6b5d4f">tools/muxr.toml</text>
  <text x="75" y="335" font-family="'IBM Plex Mono', monospace"
        font-size="9" fill="#c4b99a">version, source, checksums, sigs</text>

  <!-- === CENTER: PROCESS (kit sync + verify) === -->
  <line x1="250" y1="140" x2="380" y2="175" stroke="#c4b99a" stroke-width="1.5"/>
  <line x1="310" y1="295" x2="380" y2="235" stroke="#c4b99a" stroke-width="1.5"/>

  <rect x="380" y="100" width="380" height="220" fill="none"
        stroke="#2c2417" stroke-width="2"/>
  <rect x="380" y="100" width="380" height="28" fill="#2c2417"/>
  <text x="570" y="120" text-anchor="middle" font-family="'IBM Plex Mono', monospace"
        font-size="12" fill="#faf6ed" font-weight="bold">kit sync + verify</text>

  <!-- Resolution -->
  <text x="400" y="150" font-family="'IBM Plex Mono', monospace"
        font-size="10" fill="#2c2417" font-weight="bold">1. resolve</text>
  <text x="415" y="165" font-family="'IBM Plex Mono', monospace"
        font-size="9" fill="#6b5d4f">multi-registry, first-wins priority</text>
  <text x="415" y="178" font-family="'IBM Plex Mono', monospace"
        font-size="9" fill="#6b5d4f">apply local pins (version/registry)</text>

  <!-- Generate -->
  <text x="400" y="200" font-family="'IBM Plex Mono', monospace"
        font-size="10" fill="#2c2417" font-weight="bold">2. generate</text>
  <text x="415" y="215" font-family="'IBM Plex Mono', monospace"
        font-size="9" fill="#6b5d4f">write mise config via toml_edit API</text>
  <text x="415" y="228" font-family="'IBM Plex Mono', monospace"
        font-size="9" fill="#6b5d4f">mise install → binaries on PATH</text>

  <!-- Verify -->
  <text x="400" y="250" font-family="'IBM Plex Mono', monospace"
        font-size="10" fill="#2c2417" font-weight="bold">3. verify</text>
  <text x="415" y="265" font-family="'IBM Plex Mono', monospace"
        font-size="9" fill="#6b5d4f">SHA256 checksums of installed binaries</text>
  <text x="415" y="278" font-family="'IBM Plex Mono', monospace"
        font-size="9" fill="#6b5d4f">cosign keyless / GitHub attestation</text>

  <!-- S-2 integrity -->
  <rect x="400" y="290" width="340" height="22" fill="none"
        stroke="#2c2417" stroke-width="1.5"/>
  <text x="570" y="306" text-anchor="middle" font-family="'IBM Plex Mono', monospace"
        font-size="9" fill="#2c2417" font-weight="bold">S-2: same version + different checksum = HALT</text>

  <!-- === RIGHT: OUTPUTS === -->
  <line x1="760" y1="165" x2="860" y2="110" stroke="#c4b99a" stroke-width="1.5"/>
  <line x1="760" y1="210" x2="860" y2="210" stroke="#c4b99a" stroke-width="1.5"/>
  <line x1="760" y1="280" x2="860" y2="310" stroke="#c4b99a" stroke-width="1.5"/>

  <!-- Output: mise config -->
  <rect x="860" y="70" width="280" height="70" fill="none"
        stroke="#2c2417" stroke-width="2"/>
  <text x="1000" y="90" text-anchor="middle" font-family="'IBM Plex Mono', monospace"
        font-size="11" fill="#2c2417" font-weight="bold">mise config.toml</text>
  <text x="1000" y="110" text-anchor="middle" font-family="'IBM Plex Mono', monospace"
        font-size="9" fill="#6b5d4f">pinned versions + checksums</text>
  <text x="1000" y="125" text-anchor="middle" font-family="'IBM Plex Mono', monospace"
        font-size="9" fill="#6b5d4f">platform-specific URLs</text>

  <!-- Output: verified binaries -->
  <rect x="860" y="170" width="280" height="70" fill="none"
        stroke="#2c2417" stroke-width="2"/>
  <text x="1000" y="190" text-anchor="middle" font-family="'IBM Plex Mono', monospace"
        font-size="11" fill="#2c2417" font-weight="bold">verified binaries</text>
  <text x="1000" y="210" text-anchor="middle" font-family="'IBM Plex Mono', monospace"
        font-size="9" fill="#6b5d4f">gh, jq, rune, muxr, ...</text>
  <text x="1000" y="225" text-anchor="middle" font-family="'IBM Plex Mono', monospace"
        font-size="9" fill="#6b5d4f">checksummed + signature-verified</text>

  <!-- Output: lockfile -->
  <rect x="860" y="270" width="280" height="70" fill="none"
        stroke="#2c2417" stroke-width="2"/>
  <text x="1000" y="290" text-anchor="middle" font-family="'IBM Plex Mono', monospace"
        font-size="11" fill="#2c2417" font-weight="bold">lockfile.json</text>
  <text x="1000" y="310" text-anchor="middle" font-family="'IBM Plex Mono', monospace"
        font-size="9" fill="#6b5d4f">integrity baseline for drift detection</text>
  <text x="1000" y="325" text-anchor="middle" font-family="'IBM Plex Mono', monospace"
        font-size="9" fill="#6b5d4f">supply chain tamper evidence</text>

  <!-- Footer -->
  <line x1="40" y1="360" x2="1160" y2="360" stroke="#c4b99a" stroke-width="1"/>
  <text x="600" y="380" font-family="'IBM Plex Mono', monospace"
        font-size="10" fill="#6b5d4f" text-anchor="middle">Verified developer toolchains from git-based registries</text>
  <text x="590" y="408" text-anchor="middle" fill="#2c2417"
        font-family="'IBM Plex Mono', monospace" font-size="9"
        font-weight="600">Built with GitLab</text>
  <g transform="translate(634, 397) scale(0.045)">
    <path d="M282.83,170.73l-.27-.69-26.14-68.22a6.81,6.81,0,0,0-2.69-3.24,7,7,0,0,0-8,.43,7,7,0,0,0-2.32,3.52l-17.65,54H154.29l-17.65-54A6.86,6.86,0,0,0,134.32,99a7,7,0,0,0-8-.43,6.87,6.87,0,0,0-2.69,3.24L97.44,170l-.26.69a48.54,48.54,0,0,0,16.1,56.1l.09.07.24.17,39.82,29.82,19.7,14.91,12,9.06a8.07,8.07,0,0,0,9.76,0l12-9.06,19.7-14.91,40.06-30,.1-.08A48.56,48.56,0,0,0,282.83,170.73Z" fill="#E24329"/>
    <path d="M282.83,170.73l-.27-.69a88.3,88.3,0,0,0-35.15,15.8L190,229.25c19.55,14.79,36.57,27.64,36.57,27.64l40.06-30,.1-.08A48.56,48.56,0,0,0,282.83,170.73Z" fill="#FC6D26"/>
    <path d="M153.43,256.89l19.7,14.91,12,9.06a8.07,8.07,0,0,0,9.76,0l12-9.06,19.7-14.91S209.55,244,190,229.25C170.45,244,153.43,256.89,153.43,256.89Z" fill="#FCA326"/>
    <path d="M132.58,185.84A88.19,88.19,0,0,0,97.44,170l-.26.69a48.54,48.54,0,0,0,16.1,56.1l.09.07.24.17,39.82,29.82s17-12.85,36.57-27.64Z" fill="#FC6D26"/>
  </g>
</svg>
