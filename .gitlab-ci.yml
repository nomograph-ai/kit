# gitlab.com/nomograph/kit .gitlab-ci.yml
#
# Pipeline structure provided by nomograph/pipeline tool-rust@v4.1.2.

default:
  tags: [storr]

include:
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - component: gitlab.com/nomograph/pipeline/tool-rust@v4.1.2
    inputs:
      binary_name: kit
      project_description: "Verified tool registry manager for the nomograph estate."
      crates_publish: true

check-symlinks:
  stage: lint
  image: alpine:3.19
  before_script:
    - apk add --no-cache bash git
  script:
    - bash scripts/check-symlinks.sh
