# kit CLI CI/CD pipeline
#
# Supply chain: CycloneDX SBOM + cosign keyless signing via GitLab OIDC.
# Binaries published to GitLab Generic Package Registry on tag.

include:
  - template: Jobs/Secret-Detection.gitlab-ci.yml

stages:
  - test
  - build
  - sign
  - publish
  - release

default:
  tags:
    - storr
  interruptible: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo

workflow:
  name: "$CI_COMMIT_REF_NAME ($CI_PIPELINE_SOURCE)"
  auto_cancel:
    on_new_commit: interruptible
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# -- Reusable config --

.rust:
  image: rust:1.93-bookworm
  cache:
    - key: cargo-registry-${CI_COMMIT_REF_SLUG}
      paths:
        - .cargo/registry/cache
        - .cargo/registry/index
      policy: pull-push
    - key: cargo-target-${CI_COMMIT_REF_SLUG}
      paths:
        - target/
      policy: pull-push

.rust-macos:
  tags:
    - saas-macos-medium-m1
  image: macos-15-xcode-16
  cache:
    - key: cargo-macos-${CI_COMMIT_REF_SLUG}
      paths:
        - .cargo/registry/cache
        - .cargo/registry/index
        - target/
      policy: pull-push
  before_script:
    - export CARGO_HOME="${CI_PROJECT_DIR}/.cargo"
    - export RUSTUP_HOME="${CI_PROJECT_DIR}/.rustup"
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.93.0
    - source "${CARGO_HOME}/env"
    - rustc --version

.on-tag:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

.on-code-change:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# -- Test stage --

check:
  stage: test
  extends:
    - .rust
    - .on-code-change
  script:
    - rustup component add clippy
    - cargo clippy --release -- -D warnings
    - cargo test --release

audit:
  stage: test
  extends:
    - .rust
    - .on-code-change
  needs:
    - job: check
      artifacts: false
  script:
    - cargo install --locked cargo-audit cargo-deny
    - echo "--- cargo audit (RustSec advisory database) ---"
    - cargo audit
    - echo "--- cargo deny (licenses, advisories, bans) ---"
    - cargo deny check advisories licenses bans

# -- Build stage (tag only) --

build:linux-amd64:
  stage: build
  extends:
    - .rust
    - .on-tag
  interruptible: false
  needs:
    - job: check
      artifacts: false
    - job: audit
      artifacts: false
  script:
    - cargo install --locked cargo-cyclonedx
    - cargo build --release
    - strip target/release/kit
    - cp target/release/kit kit-linux-amd64
    - sha256sum kit-linux-amd64 > checksums-linux.txt
    - echo "--- Generating CycloneDX SBOM ---"
    - cargo cyclonedx --format json --override-filename kit-linux-amd64.sbom.cdx
  artifacts:
    paths:
      - kit-linux-amd64
      - checksums-linux.txt
      - kit-linux-amd64.sbom.cdx.json
    expire_in: 4 weeks
    reports:
      cyclonedx:
        - kit-linux-amd64.sbom.cdx.json

build:darwin-arm64:
  stage: build
  extends:
    - .rust-macos
    - .on-tag
  interruptible: false
  needs:
    - job: check
      artifacts: false
    - job: audit
      artifacts: false
  script:
    - cargo install --locked cargo-cyclonedx
    - cargo build --release
    - strip target/release/kit
    - cp target/release/kit kit-darwin-arm64
    - shasum -a 256 kit-darwin-arm64 > checksums-darwin.txt
    - echo "--- Generating CycloneDX SBOM ---"
    - cargo cyclonedx --format json --override-filename kit-darwin-arm64.sbom.cdx
  artifacts:
    paths:
      - kit-darwin-arm64
      - checksums-darwin.txt
      - kit-darwin-arm64.sbom.cdx.json
    expire_in: 4 weeks
    reports:
      cyclonedx:
        - kit-darwin-arm64.sbom.cdx.json

# -- Sign stage (tag only) --

sign:linux:
  stage: sign
  extends: .on-tag
  image:
    name: bitnami/cosign:latest
    entrypoint: [""]
  interruptible: false
  needs:
    - job: build:linux-amd64
      artifacts: true
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  script:
    - echo "--- Signing binary ---"
    - cosign sign-blob --yes
        --bundle kit-linux-amd64.bundle
        kit-linux-amd64
    - echo "--- Signing SBOM ---"
    - cosign sign-blob --yes
        --bundle kit-linux-amd64.sbom.cdx.json.bundle
        kit-linux-amd64.sbom.cdx.json || echo 'SBOM signing skipped'
  artifacts:
    paths:
      - kit-linux-amd64.bundle
      - kit-linux-amd64.sbom.cdx.json.bundle
    expire_in: 4 weeks

sign:darwin:
  stage: sign
  extends: .on-tag
  image:
    name: bitnami/cosign:latest
    entrypoint: [""]
  interruptible: false
  needs:
    - job: build:darwin-arm64
      artifacts: true
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  script:
    - echo "--- Signing binary ---"
    - cosign sign-blob --yes
        --bundle kit-darwin-arm64.bundle
        kit-darwin-arm64
    - echo "--- Signing SBOM ---"
    - cosign sign-blob --yes
        --bundle kit-darwin-arm64.sbom.cdx.json.bundle
        kit-darwin-arm64.sbom.cdx.json || echo 'SBOM signing skipped'
  artifacts:
    paths:
      - kit-darwin-arm64.bundle
      - kit-darwin-arm64.sbom.cdx.json.bundle
    expire_in: 4 weeks

# -- Publish to Package Registry (tag only) --

publish:
  stage: publish
  extends: .on-tag
  image: alpine:latest
  interruptible: false
  needs:
    - job: build:darwin-arm64
      artifacts: true
    - job: build:linux-amd64
      artifacts: true
  before_script:
    - apk add --no-cache curl
  script:
    - |
      cat checksums-*.txt > checksums.txt 2>/dev/null || true
      cat checksums.txt
    - |
      for binary in kit-darwin-arm64 kit-linux-amd64; do
        if [ -f "${binary}" ]; then
          echo "Uploading ${binary}..."
          curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
               --upload-file ${binary} \
               "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kit/${CI_COMMIT_TAG}/${binary}"
        fi
      done
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file checksums.txt \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kit/${CI_COMMIT_TAG}/checksums.txt"

# -- Release (tag only) --

release:
  stage: release
  extends: .on-tag
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  interruptible: false
  needs:
    - job: build:darwin-arm64
      artifacts: true
    - job: build:linux-amd64
      artifacts: true
    - job: sign:darwin
      artifacts: true
    - job: sign:linux
      artifacts: true
    - job: publish
  script:
    - echo "Creating release for ${CI_COMMIT_TAG}"
  release:
    tag_name: ${CI_COMMIT_TAG}
    name: "kit ${CI_COMMIT_TAG}"
    description: |
      ## kit ${CI_COMMIT_TAG}

      Verified tool registry manager -- manages developer toolchains from git-based registries.

      ### Install (mise)

      ```toml
      [tools."http:kit"]
      version = "${CI_COMMIT_TAG#v}"

      [tools."http:kit".platforms]
      macos-arm64 = { url = "https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/generic/kit/${CI_COMMIT_TAG}/kit-darwin-arm64", bin = "kit" }
      linux-x64 = { url = "https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/generic/kit/${CI_COMMIT_TAG}/kit-linux-amd64", bin = "kit" }
      ```

      ### Install (manual)

      ```bash
      # macOS (Apple Silicon)
      curl -L "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kit/${CI_COMMIT_TAG}/kit-darwin-arm64" -o kit
      chmod +x kit

      # Linux (amd64)
      curl -L "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kit/${CI_COMMIT_TAG}/kit-linux-amd64" -o kit
      chmod +x kit
      ```

      ### Verify

      ```bash
      cosign verify-blob \
        --bundle kit-darwin-arm64.bundle \
        --certificate-oidc-issuer https://gitlab.com \
        --certificate-identity-regexp 'https://gitlab.com/dunn.dev/kit/cli' \
        kit-darwin-arm64
      ```
    assets:
      links:
        - name: kit-darwin-arm64
          url: ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kit/${CI_COMMIT_TAG}/kit-darwin-arm64
          link_type: package
        - name: kit-linux-amd64
          url: ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kit/${CI_COMMIT_TAG}/kit-linux-amd64
          link_type: package
        - name: checksums.txt
          url: ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kit/${CI_COMMIT_TAG}/checksums.txt
          link_type: other
        - name: kit-darwin-arm64.bundle
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/kit-darwin-arm64.bundle?job=sign:darwin"
          link_type: other
        - name: kit-linux-amd64.bundle
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/kit-linux-amd64.bundle?job=sign:linux"
          link_type: other
        - name: kit-darwin-arm64.sbom.cdx.json
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/kit-darwin-arm64.sbom.cdx.json?job=build:darwin-arm64"
          link_type: other
        - name: kit-linux-amd64.sbom.cdx.json
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/kit-linux-amd64.sbom.cdx.json?job=build:linux-amd64"
          link_type: other
